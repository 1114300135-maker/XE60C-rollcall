<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XE60C 點名系統 (GitHub 版)</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f0f2f5; --accent: #8e44ad; }
        
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            max-width: 1024px;
            width: 100%;
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }

        header { text-align: center; margin-bottom: 15px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        
        .stats { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 15px; 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 8px; 
            font-weight: bold;
            flex-wrap: wrap;
        }

        .subject-select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; }

        /* 響應式座位表：在小螢幕自動縮放 */
        .grid-wrapper {
            overflow-x: auto;
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 10px;
        }

        .seating-chart { 
            display: grid; 
            grid-template-columns: repeat(2, 90px) 25px repeat(2, 90px) 25px repeat(2, 90px) 25px repeat(2, 90px); 
            gap: 8px; 
            padding: 15px;
            background: #e2e8f0;
            border-radius: 8px;
        }

        .gap-column { background: transparent; pointer-events: none; }

        .seat { 
            background: white; border: 1px solid #ccc; border-radius: 6px; 
            padding: 8px 2px; text-align: center; min-height: 70px; 
            cursor: pointer; display: flex; flex-direction: column; 
            justify-content: center; transition: all 0.2s;
            user-select: none;
        }

        .seat:active { transform: scale(0.92); }
        .seat.winner { transform: scale(1.15); box-shadow: 0 0 15px #f1c40f; border: 2px solid #f1c40f; z-index: 10; }

        .seat-info { font-size: 0.6rem; color: #999; margin-bottom: 2px; }
        .stu-id { font-size: 0.7rem; color: #2c3e50; font-family: monospace; }
        .name-ch { font-size: 0.95rem; font-weight: bold; }
        .name-en { font-size: 0.75rem; color: #666; }

        .present { background-color: #e6fffa; border-color: var(--success); color: #234e52; }
        .absent { background-color: #fff5f5; border-color: var(--danger); color: #822727; }
        .empty { background-color: #f1f1f1; border: 1px dashed #ccc; cursor: default; opacity: 0.5; }

        .screen { 
            width: 80%; max-width: 400px; margin: 20px auto; background: #333; color: white; 
            text-align: center; padding: 10px; border-radius: 5px;
            font-weight: bold; font-size: 1rem; letter-spacing: 8px;
        }

        .controls { 
            margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; 
        }
        
        button { 
            padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; 
            font-weight: bold; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-copy { background: var(--primary); color: white; }
        .btn-pick { background: var(--accent); color: white; }
        .btn-reset { background: #cbd5e0; color: #4a5568; }
        button:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .seat { min-height: 60px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1>XE60C 教室點名系統</h1></header>
    
    <div class="stats">
        <div>科目: 
            <select id="subject" class="subject-select">
                <option value="早上8點">早上8點</option>
                <option value="西班牙文">西班牙文</option>
                <option value="音樂">音樂</option>
                <option value="生物">生物</option>
                <option value="電腦">電腦</option>
                <option value="人格修養">人格修養</option>
                <option value="現代文學">現代文學</option>
                <option value="數學">數學</option>
                <option value="none">不顯示</option>
            </select>
        </div>
        <div style="color: var(--success);">出席: <span id="present-count">0</span></div>
        <div style="color: var(--danger);">缺席: <span id="absent-count">0</span></div>
    </div>

    <div class="grid-wrapper">
        <div id="seating-grid" class="seating-chart"></div>
    </div>

    <div class="screen">投 影 幕</div>

    <div class="controls">
        <button class="btn-copy" onclick="exportResult()">複製名單</button>
        <button class="btn-pick" onclick="randomPick()">隨機抽點</button>
        <button class="btn-reset" onclick="reset()">全部重設</button>
    </div>
</div>

<script>
    const rawData = [
        {pos:"1-7", id:"1114300146", ch:"李婕禕", en:"Eve"}, {pos:"2-7", id:"1114300501", ch:"賈伯珍", en:"Haein"}, {pos:"3-7", id:"1114300174", ch:"蔡悅琳", en:"Lina"}, {pos:"4-7", id:"1114300137", ch:"賴瑾安", en:"Ashley"}, {pos:"5-7", id:"1114300154", ch:"張鈺婕", en:"Wendy"}, {pos:"6-7", id:"1114300165", ch:"趙于嫻", en:"Abby"}, {pos:"7-7", id:"1114300141", ch:"林紫騏", en:"Nancy"}, {pos:"8-7", id:"1114300173", ch:"黃毓霏", en:"Lily"},
        {pos:"1-6", id:"1114300155", ch:"朱雯芳", en:"Mia"}, {pos:"2-6", id:"1114300169", ch:"遊梁健雅", en:"Luna"}, {pos:"3-6", id:"1114300124", ch:"林沁榆", en:"Amber"}, {pos:"4-6", id:"1114300130", ch:"陳祉恩", en:"Bianca"}, {pos:"5-6", id:"1114300175", ch:"陳宥卉", en:"Iris"}, {pos:"6-6", id:"1114300164", ch:"王以倫", en:"Juan Jose"}, {pos:"7-6", id:"1114300163", ch:"曲孝寬", en:"Miller"}, {pos:"8-6", id:"1114300138", ch:"羅凱爾", en:"Mikayeel"},
        {pos:"1-5", id:"1114300171", ch:"張湘翊", en:"Cecelia"}, {pos:"2-5", id:"1114300160", ch:"陳漢庭", en:"Lina"}, {pos:"3-5", id:"1114300159", ch:"陳冠宇", en:"Benson"}, {pos:"4-5", id:"1114300123", ch:"陳湘甯", en:"Ariel"}, {pos:"5-5", id:"1114300131", ch:"陳又瑄", en:"Christy"}, {pos:"6-5", id:"1114300170", ch:"張子瑜", en:"Yvonne"}, {pos:"7-5", id:"1114300121", ch:"龔昱瑄", en:"Kelly"}, {pos:"8-5", id:"1114300151", ch:"張雅玟", en:"Judy"},
        {pos:"1-4", id:"1114300153", ch:"陳以婕", en:"Emma"}, {pos:"2-4", id:"1114300167", ch:"柯品瑀", en:"Pamela"}, {pos:"3-4", id:"1114300158", ch:"陳琦涵", en:"Hannah"}, {pos:"4-4", id:"1114300147", ch:"李恩妮", en:"Miu Miu"}, {pos:"5-4", id:"1114300129", ch:"陳靜宜", en:"Luna"}, {pos:"6-4", id:"1114300148", ch:"林金姵", en:"Linda"}, {pos:"7-4", id:"1114300127", ch:"陳乙瑄", en:"Sharon"}, {pos:"8-4", id:"1114300143", ch:"許唯芯", en:"Una"},
        {pos:"1-3", id:"1114300161", ch:"張乙芹", en:"Irene"}, {pos:"2-3", id:"1114300133", ch:"陳玟慈", en:"Emily"}, {pos:"3-3", id:"1114300132", ch:"賴宥璇", en:"Alina"}, {pos:"4-3", id:"1114300139", ch:"辛俊文", en:"Jun-wen"}, {pos:"5-3", id:"1114300140", ch:"黃靖晏", en:"Amber"}, {pos:"6-3", id:"1114300157", ch:"楊芷芹", en:"Alex"}, {pos:"7-3", id:"1114300142", ch:"吳霈瑜", en:"Yuri"}, {pos:"8-3", id:"1114300172", ch:"廖靚薇", en:"Nicole"},
        {pos:"1-2", id:"1114300128", ch:"王溱妤", en:"Zoie"}, {pos:"2-2", id:"1114300134", ch:"江芯語", en:"Ina"}, {pos:"3-2", id:"1114300502", ch:"鄭皓軒", en:"Suppakarn"}, {pos:"4-2", id:"1114300156", ch:"連子甯", en:"Liliya"}, {pos:"5-2", id:"1114300126", ch:"林奕帆", en:"Ivan"}, {pos:"6-2", id:"1114300152", ch:"牛昱翔", en:"Sean"}, {pos:"7-2", id:"1114300135", ch:"陳世豪", en:"Howard"}, {pos:"8-2", id:"1114300166", ch:"林宜樺", en:"Novalie"},
        {pos:"1-1", id:"1114300162", ch:"王妍菻", en:"Grace"}, {pos:"2-1", id:"1114300168", ch:"卓彥均", en:"Cynthia"}, {pos:"3-1", id:"1114300144", ch:"游芯語", en:"Abby"}, {pos:"4-1", id:"1114300149", ch:"陳可紜", en:"Amber"}, {pos:"5-1", id:"1114300136", ch:"曾安岑", en:"Ann"}, {pos:"6-1", id:"1114300145", ch:"李易昌", en:"Jason"}, {pos:"7-1", id:"1114300122", ch:"余沛容", en:"Melody"}, {pos:"8-1", id:"empty", ch:"(空位)", en:""}
    ];

    let attendance = {};
    const grid = document.getElementById('seating-grid');

    function init() {
        grid.innerHTML = '';
        // 讀取快取
        const saved = localStorage.getItem('xe60c_att');
        attendance = saved ? JSON.parse(saved) : {};

        rawData.forEach((s, index) => {
            const seat = document.createElement('div');
            if (s.id === 'empty') {
                seat.className = 'seat empty';
                seat.innerHTML = `<span class="seat-info">${s.pos}</span><span class="name-ch">空位</span>`;
            } else {
                // 如果快取沒資料，預設為 true (出席)
                if (attendance[s.id] === undefined) attendance[s.id] = true;
                
                seat.className = `seat ${attendance[s.id] ? 'present' : 'absent'}`;
                seat.id = `seat-${s.id}`;
                seat.innerHTML = `
                    <span class="seat-info">${s.pos}</span>
                    <span class="stu-id">${s.id.slice(-3)}</span>
                    <span class="name-ch">${s.ch}</span>
                    <span class="name-en">${s.en}</span>
                `;
                seat.onclick = () => toggle(s.id);
            }
            grid.appendChild(seat);
            // 插入走道
            if ([1, 3, 5].includes(index % 8)) {
                const spacer = document.createElement('div');
                spacer.className = 'gap-column';
                grid.appendChild(spacer);
            }
        });
        updateStats();
    }

    function toggle(id) {
        attendance[id] = !attendance[id];
        document.getElementById(`seat-${id}`).className = `seat ${attendance[id] ? 'present' : 'absent'}`;
        localStorage.setItem('xe60c_att', JSON.stringify(attendance));
        updateStats();
    }

    function updateStats() {
        const total = rawData.filter(s => s.id !== 'empty').length;
        const present = Object.values(attendance).filter(v => v).length;
        document.getElementById('present-count').innerText = present;
        document.getElementById('absent-count').innerText = total - present;
    }

    function reset() { 
        if(confirm('重設所有點名狀態？')) {
            localStorage.removeItem('xe60c_att');
            init();
        }
    }

    function randomPick() {
        const presentIds = Object.keys(attendance).filter(id => attendance[id] === true);
        if (presentIds.length === 0) return alert("目前無人在席");
        
        const rid = presentIds[Math.floor(Math.random() * presentIds.length)];
        const el = document.getElementById(`seat-${rid}`);
        
        el.classList.add('winner');
        setTimeout(() => {
            alert(`🎯 隨機抽點：${rawData.find(s=>s.id===rid).ch}`);
            el.classList.remove('winner');
        }, 400);
    }

    function exportResult() {
        const subject = document.getElementById('subject').value;
        const absentList = rawData
            .filter(s => s.id !== 'empty' && !attendance[s.id])
            .map(s => `${s.id.slice(-3)}${s.ch}`);
        
        const dateStr = new Date().toLocaleDateString();
        const res = `XE60C ${subject === 'none' ? '' : subject}\n日期: ${dateStr}\n缺席: ${absentList.length > 0 ? absentList.join(', ') : '全員出席'}`;
        
        navigator.clipboard.writeText(res).then(() => alert('已複製名單！'));
    }

    init();
</script>
</body>
</html>
