<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, user-scalable=yes">
    <title>XE60C 智慧點名排座 v4.2</title>
    <style>
        :root { 
            --primary: #334155; --success: #10b981; --danger: #ef4444; 
            --bg: #f8fafc; --highlight: #3b82f6; --card-bg: #ffffff; 
            --purple: #8b5cf6; --text: #1e293b; --border: #e2e8f0;
        }
        
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { width: 1050px; margin: 30px auto; background: var(--card-bg); padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }

        h1 { margin: 0 0 20px 0; color: var(--primary); text-align: center; font-size: 2rem; letter-spacing: 1px; }

        .header-box { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 20px; align-items: center; background: var(--bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        .stat-card { text-align: center; border-left: 1px solid var(--border); }
        .stat-value { font-size: 1.8rem; font-weight: 800; display: block; line-height: 1.2; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: bold; font-size: 1rem; background: white; outline: none; transition: 0.2s; }

        .save-manager { background: var(--bg); padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border); }
        .save-input-group { display: flex; gap: 12px; margin-bottom: 15px; }
        .save-input-group input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: bold; color: var(--highlight); font-size: 1rem; outline: none; }
        
        .save-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .save-tag { background: white; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .save-tag:hover { border-color: var(--highlight); color: var(--highlight); transform: translateY(-2px); }

        .seating-chart { display: grid; grid-template-columns: repeat(2, 105px) 40px repeat(2, 105px) 40px repeat(2, 105px) 40px repeat(2, 105px); gap: 12px; padding: 30px; background: #f1f5f9; border-radius: 20px; justify-content: center; border: 1px solid var(--border); }
        .seat { background: white; border: 2px solid transparent; border-radius: 14px; padding: 12px 5px; text-align: center; min-height: 95px; position: relative; transition: all 0.2s; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        
        .seat.present { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
        .seat.absent { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
        
        .seat.is-manual::after { content: '🔒'; position: absolute; top: -8px; right: -8px; font-size: 1rem; background: white; border-radius: 50%; padding: 2px; }
        .seat.is-manual { border-color: var(--highlight); }

        .seat.empty { background: #e2e8f0; border: 2px dashed #cbd5e1; cursor: default; opacity: 0.5; pointer-events: none; }

        .footer-controls { margin-top: 30px; display: flex; justify-content: center; gap: 15px; border-top: 1px solid var(--border); padding-top: 30px; }
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; padding: 14px 28px; display: flex; align-items: center; gap: 8px; }
        
        .btn-edit { background: var(--highlight); color: white; }
        .btn-edit.active { background: var(--primary); }
        .btn-shuffle { background: var(--purple); color: white; }

        #picker-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.4); z-index:100; justify-content:center; align-items:center; backdrop-filter: blur(8px); }
        #picker-overlay.show { display: flex; }
        .picker-content { background:white; padding:30px; border-radius:24px; width:650px; display:flex; flex-direction:column; }
        
        #picker-search { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--border); font-size: 1.1rem; outline: none; margin-top: 15px; }
        .picker-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; overflow-y:auto; margin-top: 20px; }
        .picker-item { padding:12px; border: 1px solid var(--border); border-radius:10px; cursor:pointer; text-align:center; font-size:0.9rem; background: var(--bg); }
        .picker-item:hover { background: var(--highlight); color:white; }

        #toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: white; padding: 14px 24px; border-radius: 12px; font-weight: bold; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 1000; }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>XE60C 智慧點名排座</h1></header>

    <div class="save-manager">
        <div class="save-input-group">
            <input type="text" id="save-name" placeholder="佈局名稱" autocomplete="off">
            <button onclick="saveCurrentLayout()" style="background:var(--success); color:white;">💾 保存佈局</button>
        </div>
        <div id="save-list" class="save-list"></div>
    </div>

    <div class="header-box">
        <div><select id="subject"><option>西班牙文</option><option>音樂</option><option>電腦</option></select></div>
        <div class="stat-card"><span id="count-p" class="stat-value" style="color:var(--success)">0</span>出席</div>
        <div class="stat-card"><span id="count-a" class="stat-value" style="color:var(--danger)">0</span>缺席</div>
        <button style="background:var(--primary); color:white;" onclick="exportResult()">📋 複製報表</button>
    </div>

    <div id="seating-grid" class="seating-chart"></div>

    <div class="footer-controls">
        <button id="btn-change-mode" class="btn-edit" onclick="toggleChangeMode()">👤 手動指定</button>
        <button class="btn-shuffle" onclick="shuffleUnfixed()">🔀 打亂座位</button>
        <button onclick="resetAttendance()" style="background:#f1f5f9; color:#64748b;">🧹 清除點名</button>
    </div>
</div>

<div id="picker-overlay"><div class="picker-content">
    <div style="display:flex; justify-content:space-between;"><h3>快速搜尋</h3><button onclick="closePicker()" style="background:none; font-size:1.8rem;">&times;</button></div>
    <input type="text" id="picker-search" placeholder="輸入學號後三碼或姓名..." autocomplete="off">
    <div class="picker-grid" id="student-picker-list"></div>
</div></div>
<div id="toast">✅ 提示訊息</div>

<script>
    const rawData = [
        {pos:"1-7", id:"1114300146", ch:"李婕禕"}, {pos:"2-7", id:"1114300501", ch:"賈伯珍"}, {pos:"3-7", id:"1114300174", ch:"蔡悅琳"}, {pos:"4-7", id:"1114300137", ch:"賴瑾安"}, {pos:"5-7", id:"1114300154", ch:"張鈺婕"}, {pos:"6-7", id:"1114300165", ch:"趙于嫻"}, {pos:"7-7", id:"1114300141", ch:"林紫騏"}, {pos:"8-7", id:"1114300173", ch:"黃毓霏"},
        {pos:"1-6", id:"1114300155", ch:"朱雯芳"}, {pos:"2-6", id:"1114300169", ch:"遊梁健雅"}, {pos:"3-6", id:"1114300124", ch:"林沁榆"}, {pos:"4-6", id:"1114300130", ch:"陳祉恩"}, {pos:"5-6", id:"1114300175", ch:"陳宥卉"}, {pos:"6-6", id:"1114300164", ch:"王以倫"}, {pos:"7-6", id:"1114300163", ch:"曲孝寬"}, {pos:"8-6", id:"1114300138", ch:"羅凱爾"},
        {pos:"1-5", id:"1114300171", ch:"張湘翊"}, {pos:"2-5", id:"1114300160", ch:"陳漢庭"}, {pos:"3-5", id:"1114300159", ch:"陳冠宇"}, {pos:"4-5", id:"1114300123", ch:"陳湘甯"}, {pos:"5-5", id:"1114300131", ch:"陳又瑄"}, {pos:"6-5", id:"1114300170", ch:"張子瑜"}, {pos:"7-5", id:"1114300121", ch:"龔昱瑄"}, {pos:"8-5", id:"1114300151", ch:"張雅玟"},
        {pos:"1-4", id:"1114300153", ch:"陳以婕"}, {pos:"2-4", id:"1114300167", ch:"柯品瑀"}, {pos:"3-4", id:"1114300158", ch:"陳琦涵"}, {pos:"4-4", id:"1114300147", ch:"李恩妮"}, {pos:"5-4", id:"1114300129", ch:"陳靜宜"}, {pos:"6-4", id:"1114300148", ch:"林金姵"}, {pos:"7-4", id:"1114300127", ch:"陳乙瑄"}, {pos:"8-4", id:"1114300143", ch:"許唯芯"},
        {pos:"1-3", id:"1114300161", ch:"張乙芹"}, {pos:"2-3", id:"1114300133", ch:"陳玟慈"}, {pos:"3-3", id:"1114300132", ch:"賴宥璇"}, {pos:"4-3", id:"1114300139", ch:"辛俊文"}, {pos:"5-3", id:"1114300140", ch:"黃靖晏"}, {pos:"6-3", id:"1114300157", ch:"楊芷芹"}, {pos:"7-3", id:"1114300142", ch:"吳霈瑜"}, {pos:"8-3", id:"1114300172", ch:"廖鍵薇"},
        {pos:"1-2", id:"1114300128", ch:"王溱妤"}, {pos:"2-2", id:"1114300134", ch:"江芯語"}, {pos:"3-2", id:"1114300502", ch:"鄭皓軒"}, {pos:"4-2", id:"1114300156", ch:"連子甯"}, {pos:"5-2", id:"1114300126", ch:"林奕帆"}, {pos:"6-2", id:"1114300152", ch:"牛昱翔"}, {pos:"7-2", id:"1114300135", ch:"陳世豪"}, {pos:"8-2", id:"1114300166", ch:"林宜樺"},
        {pos:"1-1", id:"1114300162", ch:"王妍菻"}, {pos:"2-1", id:"1114300168", ch:"卓彥均"}, {pos:"3-1", id:"1114300144", ch:"遊芯語"}, {pos:"4-1", id:"1114300149", ch:"陳可紜"}, {pos:"5-1", id:"1114300136", ch:"曾安岑"}, {pos:"6-1", id:"1114300145", ch:"李易昌"}, {pos:"7-1", id:"1114300122", ch:"余沛容"}, {pos:"8-1", id:"empty", ch:"(空)"}
    ];

    let attendance = JSON.parse(localStorage.getItem('xe60c_v2')) || {};
    let currentLayout = JSON.parse(localStorage.getItem('xe60c_layout')) || [...rawData];
    let manualFixedIds = JSON.parse(localStorage.getItem('xe60c_fixed')) || [];
    let savedLayouts = JSON.parse(localStorage.getItem('xe60c_library')) || {};
    let isChangingMode = false;
    let pickingIdx = null;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function init() { renderGrid(); renderSaveList(); updateUI(); }

    function saveCurrentLayout() {
        const name = document.getElementById('save-name').value.trim();
        if (!name) return showToast("請輸入名稱");
        savedLayouts[name] = { layout: JSON.parse(JSON.stringify(currentLayout)), fixed: [...manualFixedIds] };
        localStorage.setItem('xe60c_library', JSON.stringify(savedLayouts));
        renderSaveList(); showToast("已保存佈局");
    }

    function renderSaveList() {
        const listEl = document.getElementById('save-list'); listEl.innerHTML = '';
        Object.keys(savedLayouts).sort().reverse().forEach(name => {
            const tag = document.createElement('div'); tag.className = 'save-tag';
            tag.innerHTML = `<span>${name}</span><span onclick="deleteLayout('${name}', event)">&times;</span>`;
            tag.onclick = () => {
                currentLayout = JSON.parse(JSON.stringify(savedLayouts[name].layout));
                manualFixedIds = [...savedLayouts[name].fixed];
                save(); renderGrid(); showToast("載入成功");
            };
            listEl.appendChild(tag);
        });
    }

    function deleteLayout(name, e) {
        e.stopPropagation(); delete savedLayouts[name];
        localStorage.setItem('xe60c_library', JSON.stringify(savedLayouts)); renderSaveList();
    }

    function toggleChangeMode() {
        isChangingMode = !isChangingMode;
        document.getElementById('btn-change-mode').classList.toggle('active', isChangingMode);
    }

    function renderGrid() {
        const grid = document.getElementById('seating-grid'); grid.innerHTML = '';
        currentLayout.forEach((s, i) => {
            const seat = document.createElement('div');
            if (s.id === 'empty') {
                seat.className = 'seat empty'; seat.innerText = "EMPTY";
            } else {
                const isFixed = manualFixedIds.includes(s.id);
                seat.className = `seat ${attendance[s.id] !== false ? 'present' : 'absent'} ${isFixed ? 'is-manual' : ''}`;
                seat.innerHTML = `<small>${s.pos}</small><b>${s.id.slice(-3)}</b><span>${s.ch}</span>`;
                seat.onclick = () => {
                    if (isChangingMode) openPicker(i);
                    else { attendance[s.id] = !attendance[s.id]; save(); renderGrid(); updateUI(); }
                };
            }
            grid.appendChild(seat);
            if ((i + 1) % 8 !== 0 && (i + 1) % 2 === 0) {
                let gap = document.createElement('div'); gap.style.width = '40px'; grid.appendChild(gap);
            }
        });
    }

    function openPicker(idx) {
        pickingIdx = idx; document.getElementById('picker-overlay').classList.add('show');
        updatePickerList('');
    }

    function updatePickerList(keyword) {
        const listEl = document.getElementById('student-picker-list'); listEl.innerHTML = '';
        rawData.filter(s => s.id !== 'empty' && (s.id.includes(keyword) || s.ch.includes(keyword))).forEach(st => {
            const item = document.createElement('div'); item.className = 'picker-item';
            item.innerText = `${st.id.slice(-3)} ${st.ch}`;
            item.onclick = () => {
                const oldStudent = currentLayout[pickingIdx];
                const targetIdx = currentLayout.findIndex(s => s.id === st.id);
                if(targetIdx !== -1) currentLayout[targetIdx] = { ...oldStudent, pos: currentLayout[targetIdx].pos };
                currentLayout[pickingIdx] = { ...st, pos: oldStudent.pos };
                if(!manualFixedIds.includes(st.id)) manualFixedIds.push(st.id);
                save(); closePicker(); renderGrid();
            };
            listEl.appendChild(item);
        });
    }
    document.getElementById('picker-search').oninput = (e) => updatePickerList(e.target.value);
    function closePicker() { document.getElementById('picker-overlay').classList.remove('show'); }

    // ====== 穩定版綁定邏輯 ======
    function shuffleUnfixed() {
        const b1 = "1114300136"; // 曾安岑
        const b2 = "1114300124"; // 林沁榆
        
        let poolStudents = currentLayout.filter(s => s.id !== 'empty' && !manualFixedIds.includes(s.id));
        let freeSeatsIndices = [];
        currentLayout.forEach((s, i) => { if(s.id !== 'empty' && !manualFixedIds.includes(s.id)) freeSeatsIndices.push(i); });

        let finalMap = new Array(currentLayout.length).fill(null);

        // 1. 處理鎖定者的位置
        manualFixedIds.forEach(id => {
            const idx = currentLayout.findIndex(s => s.id === id);
            finalMap[idx] = currentLayout[idx];
        });

        // 2. 處理綁定邏輯
        const b1InPool = poolStudents.find(s => s.id === b1);
        const b2InPool = poolStudents.find(s => s.id === b2);

        if (b1InPool && b2InPool) {
            // 找可用的相鄰對 (偶數+奇數 且 都在 freeSeatsIndices)
            let pairs = [];
            for (let i = 0; i < currentLayout.length; i++) {
                if (i % 2 === 0 && freeSeatsIndices.includes(i) && freeSeatsIndices.includes(i+1)) {
                    pairs.push([i, i+1]);
                }
            }
            if (pairs.length > 0) {
                const pair = pairs[Math.floor(Math.random() * pairs.length)];
                finalMap[pair[0]] = b1InPool; finalMap[pair[1]] = b2InPool;
                poolStudents = poolStudents.filter(s => s.id !== b1 && s.id !== b2);
                freeSeatsIndices = freeSeatsIndices.filter(i => i !== pair[0] && i !== pair[1]);
            }
        } else if (b1InPool || b2InPool) {
            // 其中一個被鎖定，另一個在 Pool 裡
            const fixedId = manualFixedIds.includes(b1) ? b1 : b2;
            const movingId = fixedId === b1 ? b2 : b1;
            const fixedIdx = currentLayout.findIndex(s => s.id === fixedId);
            const targetIdx = fixedIdx % 2 === 0 ? fixedIdx + 1 : fixedIdx - 1;
            
            if (freeSeatsIndices.includes(targetIdx)) {
                finalMap[targetIdx] = poolStudents.find(s => s.id === movingId);
                poolStudents = poolStudents.filter(s => s.id !== movingId);
                freeSeatsIndices = freeSeatsIndices.filter(i => i !== targetIdx);
            }
        }

        // 3. 剩下的人亂數填充
        poolStudents.sort(() => Math.random() - 0.5);
        freeSeatsIndices.forEach((seatIdx, i) => {
            finalMap[seatIdx] = poolStudents[i];
        });

        // 4. 套用位置與空位
        currentLayout = currentLayout.map((s, i) => {
            if (s.id === 'empty') return s;
            return { ...finalMap[i], pos: s.pos };
        });

        save(); renderGrid(); showToast("打亂完成");
    }

    function updateUI() {
        const p = Object.values(attendance).filter(v => v !== false).length;
        document.getElementById('count-p').innerText = p;
        document.getElementById('count-a').innerText = 55 - p;
    }
    function save() {
        localStorage.setItem('xe60c_layout', JSON.stringify(currentLayout));
        localStorage.setItem('xe60c_fixed', JSON.stringify(manualFixedIds));
    }
    function resetAttendance() { attendance = {}; renderGrid(); updateUI(); }
    function exportResult() {
        const list = rawData.filter(s => s.id !== 'empty' && attendance[s.id] === false).map(s => s.ch);
        navigator.clipboard.writeText("缺席：" + (list.join(', ') || '全員出席'));
        showToast("已複製報表");
    }
    init();
</script>
</body>
</html>
