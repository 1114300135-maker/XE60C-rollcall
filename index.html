<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XE60C 班級管理系統 - 存檔版</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --bg: #f8fafc; --accent: #8e44ad; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1000px; width: 100%; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); box-sizing: border-box; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.6rem; letter-spacing: 2px; }
        
        .stats-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 12px; border-radius: 10px; font-weight: bold; flex-wrap: wrap; }
        .save-manager { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; padding: 10px; border: 1px dashed #cbd5e1; border-radius: 10px; flex-wrap: wrap; justify-content: center; background: #fff; }
        
        select, input { padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.9rem; }
        
        .grid-wrapper { overflow-x: auto; width: 100%; display: flex; justify-content: center; padding: 10px 0 20px 0; }
        .seating-chart { display: grid; grid-template-columns: repeat(2, 95px) 30px repeat(2, 95px) 30px repeat(2, 95px) 30px repeat(2, 95px); gap: 10px; padding: 20px; background: #cbd5e1; border-radius: 12px; min-width: 900px; }
        .gap-column { background: transparent; pointer-events: none; }
        .seat { background: white; border: 1px solid #94a3b8; border-radius: 8px; padding: 10px 2px; text-align: center; min-height: 85px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; transition: all 0.2s; user-select: none; }
        .seat.present { background-color: #f0fdf4; border-color: var(--success); color: #166534; }
        .seat.absent { background-color: #fef2f2; border-color: var(--danger); color: #991b1b; }
        .seat.empty { background-color: #f1f5f9; border: 1px dashed #94a3b8; cursor: default; opacity: 0.6; }
        .seat-info { font-size: 0.65rem; color: #94a3b8; margin-bottom: 4px; }
        .name-ch { font-size: 1.05rem; font-weight: bold; }
        .screen { width: 350px; margin: 20px auto; background: #1e293b; color: white; text-align: center; padding: 12px; border-radius: 0 0 20px 20px; font-weight: bold; letter-spacing: 10px; }
        .controls { margin-top: 10px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-save { background: var(--success); color: white; }
        .btn-shuffle { background: var(--warning); color: white; }
        .btn-action { background: var(--primary); color: white; }
        .btn-del { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        @keyframes winner-bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); border: 3px solid gold; box-shadow: 0 0 15px gold; } }
        .winner { animation: winner-bounce 0.5s ease 3; z-index: 50; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>XE60C 班級管理系統</h1></header>

    <div class="save-manager">
        <span>📁 讀取存檔:</span>
        <select id="save-list" onchange="loadSpecificSave()">
            <option value="default">預設座位表</option>
        </select>
        <input type="text" id="save-name" placeholder="輸入存檔名稱">
        <button class="btn-save" onclick="saveCurrentOrder()">💾 儲存當前座位</button>
        <button class="btn-del" onclick="deleteSave()">🗑️ 刪除選中存檔</button>
    </div>
    
    <div class="stats-bar">
        <span>科目: <select id="subject" class="subject-select"><option>早上8點</option><option>西班牙文</option><option>音樂</option><option>生物</option><option>電腦</option><option>人格修養</option><option>現代文學</option><option>數學</option></select></span>
        <span style="color: var(--success);">出席: <span id="present-count">0</span></span>
        <span style="color: var(--danger);">缺席: <span id="absent-count">0</span></span>
    </div>

    <div class="grid-wrapper">
        <div id="seating-grid" class="seating-chart"></div>
    </div>

    <div class="screen">投 影 幕</div>

    <div class="controls">
        <button class="btn-action" onclick="exportResult()">📋 複製缺席名單</button>
        <button class="btn-action" style="background:var(--accent)" onclick="randomPick()">🎯 隨機抽點</button>
        <button class="btn-shuffle" onclick="shuffleSeats()">🎲 隨機重排</button>
    </div>
</div>

<script>
    const defaultData = [
        {pos:"1-7", id:"1114300146", ch:"李婕禕", en:"Eve"}, {pos:"2-7", id:"1114300501", ch:"賈伯珍", en:"Haein"}, {pos:"3-7", id:"1114300174", ch:"蔡悅琳", en:"Lina"}, {pos:"4-7", id:"1114300137", ch:"賴瑾安", en:"Ashley"}, {pos:"5-7", id:"1114300154", ch:"張鈺婕", en:"Wendy"}, {pos:"6-7", id:"1114300165", ch:"趙于嫻", en:"Abby"}, {pos:"7-7", id:"1114300141", ch:"林紫騏", en:"Nancy"}, {pos:"8-7", id:"1114300173", ch:"黃毓霏", en:"Lily"},
        {pos:"1-6", id:"1114300155", ch:"朱雯芳", en:"Mia"}, {pos:"2-6", id:"1114300169", ch:"遊梁健雅", en:"Luna"}, {pos:"3-6", id:"1114300124", ch:"林沁榆", en:"Amber"}, {pos:"4-6", id:"1114300130", ch:"陳祉恩", en:"Bianca"}, {pos:"5-6", id:"1114300175", ch:"陳宥卉", en:"Iris"}, {pos:"6-6", id:"1114300164", ch:"王以倫", en:"Juan Jose"}, {pos:"7-6", id:"1114300163", ch:"曲孝寬", en:"Miller"}, {pos:"8-6", id:"1114300138", ch:"羅凱爾", en:"Mikayeel"},
        {pos:"1-5", id:"1114300171", ch:"張湘翊", en:"Cecelia"}, {pos:"2-5", id:"1114300160", ch:"陳漢庭", en:"Lina"}, {pos:"3-5", id:"1114300159", ch:"陳冠宇", en:"Benson"}, {pos:"4-5", id:"1114300123", ch:"陳湘甯", en:"Ariel"}, {pos:"5-5", id:"1114300131", ch:"陳又瑄", en:"Christy"}, {pos:"6-5", id:"1114300170", ch:"張子瑜", en:"Yvonne"}, {pos:"7-5", id:"1114300121", ch:"龔昱瑄", en:"Kelly"}, {pos:"8-5", id:"1114300151", ch:"張雅玟", en:"Judy"},
        {pos:"1-4", id:"1114300153", ch:"陳以婕", en:"Emma"}, {pos:"2-4", id:"1114300167", ch:"柯品瑀", en:"Pamela"}, {pos:"3-4", id:"1114300158", ch:"陳琦涵", en:"Hannah"}, {pos:"4-4", id:"1114300147", ch:"李恩妮", en:"Miu Miu"}, {pos:"5-4", id:"1114300129", ch:"陳靜宜", en:"Luna"}, {pos:"6-4", id:"1114300148", ch:"林金姵", en:"Linda"}, {pos:"7-4", id:"1114300127", ch:"陳乙瑄", en:"Sharon"}, {pos:"8-4", id:"1114300143", ch:"許唯芯", en:"Una"},
        {pos:"1-3", id:"1114300161", ch:"張乙芹", en:"Irene"}, {pos:"2-3", id:"1114300133", ch:"陳玟慈", en:"Emily"}, {pos:"3-3", id:"1114300132", ch:"賴宥璇", en:"Alina"}, {pos:"4-3", id:"1114300139", ch:"辛俊文", en:"Jun-wen"}, {pos:"5-3", id:"1114300140", ch:"黃靖晏", en:"Amber"}, {pos:"6-3", id:"1114300157", ch:"楊芷芹", en:"Alex"}, {pos:"7-3", id:"1114300142", ch:"吳霈瑜", en:"Yuri"}, {pos:"8-3", id:"1114300172", ch:"廖靚薇", en:"Nicole"},
        {pos:"1-2", id:"1114300128", ch:"王溱妤", en:"Zoie"}, {pos:"2-2", id:"1114300134", ch:"江芯語", en:"Ina"}, {pos:"3-2", id:"1114300502", ch:"鄭皓軒", en:"Suppakarn"}, {pos:"4-2", id:"1114300156", ch:"連子甯", en:"Liliya"}, {pos:"5-2", id:"1114300126", ch:"林奕帆", en:"Ivan"}, {pos:"6-2", id:"1114300152", ch:"牛昱翔", en:"Sean"}, {pos:"7-2", id:"1114300135", ch:"陳世豪", en:"Howard"}, {pos:"8-2", id:"1114300166", ch:"林宜樺", en:"Novalie"},
        {pos:"1-1", id:"1114300162", ch:"王妍菻", en:"Grace"}, {pos:"2-1", id:"1114300168", ch:"卓彥均", en:"Cynthia"}, {pos:"3-1", id:"1114300144", ch:"游芯語", en:"Abby"}, {pos:"4-1", id:"1114300149", ch:"陳可紜", en:"Amber"}, {pos:"5-1", id:"1114300136", ch:"曾安岑", en:"Ann"}, {pos:"6-1", id:"1114300145", ch:"李易昌", en:"Jason"}, {pos:"7-1", id:"1114300122", ch:"余沛容", en:"Melody"}, {pos:"8-1", id:"empty", ch:"(空位)", en:""}
    ];

    let currentData = [...defaultData];
    let attendance = {};

    function init() {
        refreshSaveList();
        const lastOrder = localStorage.getItem('xe60c_current_order');
        if (lastOrder) currentData = JSON.parse(lastOrder);
        render();
    }

    function render() {
        const grid = document.getElementById('seating-grid');
        grid.innerHTML = '';
        currentData.forEach((s, i) => {
            const seat = document.createElement('div');
            if (s.id === 'empty') {
                seat.className = 'seat empty';
                seat.innerHTML = `<span class="seat-info">${s.pos}</span><span class="name-ch">空位</span>`;
            } else {
                if (attendance[s.id] === undefined) attendance[s.id] = true;
                seat.className = `seat ${attendance[s.id] ? 'present' : 'absent'}`;
                seat.id = `seat-${s.id}`;
                seat.innerHTML = `<span class="seat-info">${s.pos}</span><span class="name-ch">${s.ch}</span>`;
                seat.onclick = () => { attendance[s.id] = !attendance[s.id]; render(); };
            }
            grid.appendChild(seat);
            if ([1, 3, 5].includes(i % 8)) {
                const spacer = document.createElement('div');
                spacer.className = 'gap-column';
                grid.appendChild(spacer);
            }
        });
        updateStats();
        localStorage.setItem('xe60c_current_order', JSON.stringify(currentData));
    }

    function updateStats() {
        const total = currentData.filter(s => s.id !== 'empty').length;
        const present = Object.values(attendance).filter(v => v).length;
        document.getElementById('present-count').innerText = present;
        document.getElementById('absent-count').innerText = total - present;
    }

    function shuffleSeats() {
        if (!confirm('🎲 確定要重新隨機排列全班座位嗎？')) return;
        const students = currentData.filter(s => s.id !== 'empty');
        for (let i = students.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [students[i], students[j]] = [students[j], students[i]];
        }
        students.forEach((s, i) => { currentData[i] = { ...currentData[i], id: s.id, ch: s.ch, en: s.en }; });
        render();
    }

    // 存檔邏輯
    function saveCurrentOrder() {
        const name = document.getElementById('save-name').value.trim();
        if (!name) return alert('請輸入存檔名稱');
        let saves = JSON.parse(localStorage.getItem('xe60c_all_saves') || '{}');
        saves[name] = currentData;
        localStorage.setItem('xe60c_all_saves', JSON.stringify(saves));
        document.getElementById('save-name').value = '';
        refreshSaveList();
        alert(`存檔「${name}」已儲存！`);
    }

    function refreshSaveList() {
        const select = document.getElementById('save-list');
        const saves = JSON.parse(localStorage.getItem('xe60c_all_saves') || '{}');
        select.innerHTML = '<option value="default">預設座位表</option>';
        for (let name in saves) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.innerText = name;
            select.appendChild(opt);
        }
    }

    function loadSpecificSave() {
        const name = document.getElementById('save-list').value;
        if (name === 'default') {
            currentData = [...defaultData];
        } else {
            const saves = JSON.parse(localStorage.getItem('xe60c_all_saves') || '{}');
            currentData = saves[name];
        }
        render();
    }

    function deleteSave() {
        const name = document.getElementById('save-list').value;
        if (name === 'default') return alert('預設座位表不能刪除');
        if (confirm(`確定要刪除「${name}」嗎？`)) {
            let saves = JSON.parse(localStorage.getItem('xe60c_all_saves') || '{}');
            delete saves[name];
            localStorage.setItem('xe60c_all_saves', JSON.stringify(saves));
            refreshSaveList();
            loadSpecificSave();
        }
    }

    function randomPick() {
        const presentIds = Object.keys(attendance).filter(id => attendance[id] === true);
        if (presentIds.length === 0) return alert("沒人在位置上");
        const rid = presentIds[Math.floor(Math.random() * presentIds.length)];
        const el = document.getElementById(`seat-${rid}`);
        el.classList.add('winner');
        setTimeout(() => { alert(`🎯 抽到：${currentData.find(s=>s.id===rid).ch}`); el.classList.remove('winner'); }, 1500);
    }

    function exportResult() {
        const sub = document.getElementById('subject').value;
        const absents = currentData.filter(s => s.id !== 'empty' && !attendance[s.id]).map(s => s.ch);
        const text = `【XE60C ${sub} 點名】\n缺席: ${absents.join(', ') || '全員出席'}`;
        navigator.clipboard.writeText(text).then(() => alert('名單已複製！'));
    }

    init();
</script>
</body>
</html>
