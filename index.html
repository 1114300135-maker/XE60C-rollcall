<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, user-scalable=yes">
    <title>XE60C 智慧排座系統 (Apple 官網風格)</title>
    <style>
        /* Apple 官網經典色彩變數 */
        :root { 
            --apple-bg: #F5F5F7;           /* 經典官網淺灰底色 */
            --apple-card: #FFFFFF;         /* 純白卡片 */
            --apple-text: #1D1D1F;         /* 蘋果深灰黑 */
            --apple-text-sec: #86868B;     /* 次要文字灰 */
            --apple-blue: #0071E3;         /* Apple 標誌藍 */
            --apple-blue-hover: #0077ED;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --apple-border: #D2D2D7;
            --apple-shadow: 0 4px 6px rgba(0, 0, 0, 0.02), 0 10px 24px rgba(0, 0, 0, 0.04);
            --material-bg: rgba(255, 255, 255, 0.72); /* 蘋果毛玻璃背景 */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            background: var(--apple-bg); 
            color: var(--apple-text); 
            margin: 0; 
            padding: 50px 20px 100px 20px; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 捨棄大外框，改為純淨的流式排版 */
        .container { 
            width: 1050px; 
            margin: 0 auto; 
        }

        /* Apple 官網大標題風格 */
        h1 { 
            text-align: center; 
            color: var(--apple-text); 
            font-size: 2.8rem; 
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 40px; 
        }
        
        /* 頂部數據列：浮動白卡 */
        .header-box { 
            display: grid; 
            grid-template-columns: 1.8fr 1fr 1fr 1.2fr; 
            gap: 15px; 
            margin-bottom: 30px; 
            background: var(--apple-card); 
            border-radius: 22px; 
            padding: 20px 24px; 
            align-items: center;
            box-shadow: var(--apple-shadow);
        }

        /* 選擇器優化：極簡灰色底 */
        select { 
            padding: 12px 18px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 600; 
            color: var(--apple-text); 
            background: rgba(0,0,0,0.05); 
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
            -webkit-appearance: none;
        }
        select:hover { background: rgba(0,0,0,0.08); }
        
        /* 座位網格區 */
        .seating-chart { 
            display: grid; 
            grid-template-columns: repeat(2, 105px) 40px repeat(2, 105px) 40px repeat(2, 105px) 40px repeat(2, 105px); 
            gap: 12px; 
            padding: 35px; 
            background: var(--apple-card); 
            border-radius: 32px; 
            justify-content: center; 
            box-shadow: var(--apple-shadow);
        }

        /* 簡約白底座位卡片 */
        .seat { 
            background: #FAFAFA; 
            border: 1px solid rgba(0,0,0,0.04); 
            border-radius: 18px; 
            padding: 14px 6px; 
            text-align: center; 
            min-height: 95px; 
            position: relative; 
            transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            cursor: pointer; 
        }
        .seat:hover { 
            transform: scale(1.02); 
            box-shadow: 0 6px 16px rgba(0,0,0,0.06); 
            background: var(--apple-card);
        }
        .seat b { font-size: 1.15rem; font-weight: 600; letter-spacing: 0.3px; }
        .seat span { font-size: 0.85rem; font-weight: 500; margin-top: 4px; color: var(--apple-text-sec); }

        /* 出席/缺席 狀態 */
        .seat.present { background: #EAF8ED; border: 1px solid #A1DFA8; }
        .seat.present span { color: #1E8236; }
        .seat.absent { background: #FFECEB; border: 1px solid #FFB3B0; color: #D70015; }
        .seat.absent span { color: #D70015; }
        
        /* 鎖定狀態：Apple 藍 */
        .seat.is-manual { border: 1px solid var(--apple-blue); background: #F0F7FF; }
        .seat.is-manual::after { 
            content: '🔒'; position: absolute; top: -6px; right: -6px; 
            font-size: 0.75rem; background: var(--apple-card); 
            border-radius: 50%; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); 
        }
        
        .seat.empty { background: transparent; border: 1px dashed var(--apple-border); cursor: default; }
        .seat.empty:hover { transform: none; box-shadow: none; background: transparent; }
        
        /* 黑板：俐落的深色膠囊 */
        .blackboard {
            background: var(--apple-text); 
            color: #FFFFFF;
            text-align: center;
            padding: 14px;
            margin: 30px auto 10px auto;
            width: 45%;
            border-radius: 980px; /* 極大圓角 */
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 12px;
            box-shadow: var(--apple-shadow);
        }

        /* 底部操作區：Apple Material 毛玻璃懸浮列 */
        .footer-controls { 
            margin-top: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 16px; 
            padding: 20px 30px; 
            background: var(--material-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 980px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.4);
            position: sticky;
            bottom: 30px;
            z-index: 100;
        }
        
        /* Apple 官網標準膠囊按鈕 */
        button { 
            border: none; 
            border-radius: 980px; 
            font-weight: 500; 
            cursor: pointer; 
            padding: 12px 24px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.95rem; 
            transition: all 0.2s ease; 
            letter-spacing: 0.2px;
        }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        button:active { transform: scale(0.95); opacity: 0.7; }
        
        .btn-primary { background: var(--apple-blue); color: white; }
        .btn-edit { background: rgba(0,0,0,0.06); color: var(--apple-text); }
        .btn-edit.active { background: var(--apple-text); color: white; }

        /* 歷史紀錄區 */
        .history-section { margin-top: 50px; padding: 0 10px; }
        .history-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
        .history-item { 
            background: var(--apple-card); 
            padding: 16px 20px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            transition: 0.2s;
        }
        .history-item:hover { box-shadow: var(--apple-shadow); }
        
        .history-item-actions { display: flex; gap: 8px; }
        .btn-history-load { background: rgba(0,0,0,0.05); color: var(--apple-text); padding: 8px 16px; font-size: 0.85rem; }
        .btn-history-del { background: rgba(255, 59, 48, 0.1); color: var(--apple-red); padding: 8px 16px; font-size: 0.85rem; }

        #seat-picker { position: absolute; opacity: 0; pointer-events: none; z-index: 2000; box-shadow: var(--apple-shadow); border-radius: 14px; border: 1px solid var(--apple-border); padding: 8px; background: var(--apple-card); }
        
        /* 動態島 (Dynamic Island) 提示框 - 極致流暢 */
        #toast { 
            position: fixed; 
            top: 25px; 
            left: 50%;
            transform: translateX(-50%) scale(0.9) translateY(-20px);
            background: #000000; 
            color: #FFFFFF; 
            padding: 14px 28px; 
            border-radius: 40px; 
            opacity: 0; 
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            z-index: 9999; 
            pointer-events: none; 
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
        #toast::before { content: ''; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>XE60C 智慧排座系統</h1>

    <div class="header-box">
        <select id="subject">
            <option value="none">不顯示科目</option>
            <option>早八</option><option>西班牙文</option><option>音樂</option><option>電腦</option>
            <option>生物</option><option>現代文學</option><option>數學</option><option>藝術生活</option>
        </select>
        <div style="text-align:center; font-weight: 500; color: var(--apple-text-sec);">出席 <b id="count-p" style="color:var(--apple-green); font-size: 1.5rem; display:block; margin-top:2px;">0</b></div>
        <div style="text-align:center; font-weight: 500; color: var(--apple-text-sec);">缺席 <b id="count-a" style="color:var(--apple-red); font-size: 1.5rem; display:block; margin-top:2px;">0</b></div>
        <button onclick="exportResult()" class="btn-primary" style="margin-left: auto;">複製報表</button>
    </div>

    <div id="seating-grid" class="seating-chart"></div>

    <div class="blackboard">黑板 / 講台</div>

    <div class="footer-controls">
        <button id="btn-change-mode" class="btn-edit" onclick="toggleChangeMode()">手動鎖定座位</button>
        <button class="btn-primary" onclick="shuffleLogic()">重新排列</button>
        <button style="background: var(--apple-green); color: white;" onclick="saveToHistory()">儲存紀錄</button>
        <button onclick="resetData()" style="background: transparent; color: var(--apple-text-sec);">清空重設</button>
    </div>

    <div class="history-section">
        <h3 style="margin:0; color: var(--apple-text); font-size: 1.4rem; font-weight: 600; padding-left: 5px;">歷史紀錄</h3>
        <div id="history-list" class="history-list"></div>
    </div>
</div>

<select id="seat-picker" onchange="applySeatPick(this)"></select>
<div id="toast">提示訊息</div>

<script>
    const rawData = [
        {pos:"1-7", id:"1114300146", ch:"李婕禕"}, {pos:"2-7", id:"1114300501", ch:"賈伯珍"}, {pos:"3-7", id:"1114300174", ch:"蔡悅琳"}, {pos:"4-7", id:"1114300137", ch:"賴瑾安"}, {pos:"5-7", id:"1114300154", ch:"張鈺婕"}, {pos:"6-7", id:"1114300165", ch:"趙于嫻"}, {pos:"7-7", id:"1114300141", ch:"林紫騏"}, {pos:"8-7", id:"1114300173", ch:"黃毓霏"},
        {pos:"1-6", id:"1114300155", ch:"朱雯芳"}, {pos:"2-6", id:"1114300169", ch:"遊梁健雅"}, {pos:"3-6", id:"1114300124", ch:"林沁榆"}, {pos:"4-6", id:"1114300130", ch:"陳祉恩"}, {pos:"5-6", id:"1114300175", ch:"陳宥卉"}, {pos:"6-6", id:"1114300164", ch:"王以倫"}, {pos:"7-6", id:"1114300163", ch:"曲孝寬"}, {pos:"8-6", id:"1114300138", ch:"羅凱爾"},
        {pos:"1-5", id:"1114300171", ch:"張湘翊"}, {pos:"2-5", id:"1114300160", ch:"陳漢庭"}, {pos:"3-5", id:"1114300159", ch:"陳冠宇"}, {pos:"4-5", id:"1114300123", ch:"陳湘甯"}, {pos:"5-5", id:"1114300131", ch:"陳又瑄"}, {pos:"6-5", id:"1114300170", ch:"張子瑜"}, {pos:"7-5", id:"1114300121", ch:"龔昱瑄"}, {pos:"8-5", id:"1114300151", ch:"張雅玟"},
        {pos:"1-4", id:"1114300153", ch:"陳以婕"}, {pos:"2-4", id:"1114300167", ch:"柯品瑀"}, {pos:"3-4", id:"1114300158", ch:"陳琦涵"}, {pos:"4-4", id:"1114300147", ch:"李恩妮"}, {pos:"5-4", id:"1114300129", ch:"陳靜宜"}, {pos:"6-4", id:"1114300148", ch:"林金姵"}, {pos:"7-4", id:"1114300127", ch:"陳乙瑄"}, {pos:"8-4", id:"1114300143", ch:"許唯芯"},
        {pos:"1-3", id:"1114300161", ch:"張乙芹"}, {pos:"2-3", id:"1114300133", ch:"陳玟慈"}, {pos:"3-3", id:"1114300132", ch:"賴宥璇"}, {pos:"4-3", id:"1114300139", ch:"辛俊文"}, {pos:"5-3", id:"1114300140", ch:"黃靖晏"}, {pos:"6-3", id:"1114300157", ch:"楊芷芹"}, {pos:"7-3", id:"1114300142", ch:"吳霈瑜"}, {pos:"8-3", id:"1114300172", ch:"廖鍵薇"},
        {pos:"1-2", id:"1114300128", ch:"王溱妤"}, {pos:"2-2", id:"1114300134", ch:"江芯語"}, {pos:"3-2", id:"1114300502", ch:"鄭皓軒"}, {pos:"4-2", id:"1114300156", ch:"連子甯"}, {pos:"5-2", id:"1114300126", ch:"林奕帆"}, {pos:"6-2", id:"1114300152", ch:"牛昱翔"}, {pos:"7-2", id:"1114300135", ch:"陳世豪"}, {pos:"8-2", id:"1114300166", ch:"林宜樺"},
        {pos:"1-1", id:"1114300162", ch:"王妍菻"}, {pos:"2-1", id:"1114300168", ch:"卓彥均"}, {pos:"3-1", id:"1114300144", ch:"遊芯語"}, {pos:"4-1", id:"1114300149", ch:"陳可紜"}, {pos:"5-1", id:"1114300136", ch:"曾安岑"}, {pos:"6-1", id:"1114300145", ch:"李易昌"}, {pos:"7-1", id:"1114300122", ch:"余沛容"}, {pos:"8-1", id:"empty", ch:"(空位)"}
    ];

    let attendance = JSON.parse(localStorage.getItem('xe60c_att')) || {};
    let currentLayout = JSON.parse(localStorage.getItem('xe60c_layout')) || [...rawData];
    let manualFixedIds = JSON.parse(localStorage.getItem('xe60c_fixed')) || [];
    let historyRecords = JSON.parse(localStorage.getItem('xe60c_history')) || [];
    let isChangingMode = false;
    let activeSeatIndex = null;

    function init() { buildPicker(); renderGrid(); renderHistory(); updateUI(); }

    function buildPicker() {
        const picker = document.getElementById('seat-picker');
        picker.innerHTML = '<option value="">-- 指定學生 --</option>';
        const sorted = [...rawData].filter(s => s.id !== 'empty').sort((a,b) => a.id.slice(-3).localeCompare(b.id.slice(-3)));
        sorted.forEach(s => {
            const last3 = s.id.slice(-3);
            picker.innerHTML += `<option value="${s.id}">${last3} - ${s.ch}</option>`;
        });
    }

    function toggleChangeMode() {
        isChangingMode = !isChangingMode;
        document.getElementById('btn-change-mode').classList.toggle('active', isChangingMode);
        document.getElementById('btn-change-mode').innerText = isChangingMode ? '完成鎖定' : '手動鎖定座位';
        showToast(isChangingMode ? "進入編輯模式：請點擊座位" : "回到點名模式");
    }

    function handleSeatClick(i, event) {
        const sid = currentLayout[i].id;
        if (sid === 'empty') return;
        if (!isChangingMode) {
            attendance[sid] = !attendance[sid]; 
            save(); renderGrid(); updateUI();
            return;
        }
        if (manualFixedIds.includes(sid)) {
            manualFixedIds = manualFixedIds.filter(id => id !== sid);
            save(); renderGrid();
            showToast(`已解除 ${currentLayout[i].ch} 的鎖定`);
        } else {
            activeSeatIndex = i;
            const picker = document.getElementById('seat-picker');
            picker.style.left = event.pageX + 'px';
            picker.style.top = event.pageY + 'px';
            picker.style.opacity = 1; picker.style.pointerEvents = 'auto';
            picker.focus();
        }
    }

    function applySeatPick(sel) {
        const targetId = sel.value;
        if(!targetId) { sel.style.opacity = 0; sel.style.pointerEvents = 'none'; return; }
        const oldIdx = currentLayout.findIndex(s => s.id === targetId);
        const targetStudent = rawData.find(s => s.id === targetId);
        const currentStudentAtPos = currentLayout[activeSeatIndex];
        if(oldIdx !== -1) currentLayout[oldIdx] = { ...currentStudentAtPos, pos: currentLayout[oldIdx].pos };
        currentLayout[activeSeatIndex] = { ...targetStudent, pos: currentLayout[activeSeatIndex].pos };
        if(!manualFixedIds.includes(targetId)) manualFixedIds.push(targetId);
        sel.style.opacity = 0; sel.style.pointerEvents = 'none';
        sel.value = ""; save(); renderGrid();
        showToast(`已鎖定 ${targetStudent.ch}`);
    }

    function renderGrid() {
        const grid = document.getElementById('seating-grid'); grid.innerHTML = '';
        currentLayout.forEach((s, i) => {
            const seat = document.createElement('div');
            if (s.id === 'empty') { seat.className = 'seat empty'; seat.innerText = ""; }
            else {
                const isFixed = manualFixedIds.includes(s.id);
                seat.className = `seat ${attendance[s.id] !== false ? 'present' : 'absent'} ${isFixed ? 'is-manual' : ''}`;
                seat.innerHTML = `<small style="color:var(--apple-text-sec); font-size: 0.75rem;">${s.pos}</small><b>${s.id.slice(-3)}</b><span>${s.ch}</span>`;
            }
            seat.onclick = (e) => handleSeatClick(i, e);
            grid.appendChild(seat);
            if ((i + 1) % 8 !== 0 && (i + 1) % 2 === 0) { let gap = document.createElement('div'); gap.style.width = '40px'; grid.appendChild(gap); }
        });
    }

    function shuffleLogic() {
        const groupFour = ["1114300133", "1114300129", "1114300123", "1114300132"];
        const pairA = ["1114300124", "1114300136"];
        const pairB = ["1114300126", "1114300502"];
        const forceLastRowId = "1114300149"; // 149 必須在最後一排
        
        let pool = currentLayout.filter(s => s.id !== 'empty' && !manualFixedIds.includes(s.id));
        let freeIndices = [];
        currentLayout.forEach((s, i) => { if(s.id !== 'empty' && !manualFixedIds.includes(s.id)) freeIndices.push(i); });
        let finalMap = new Array(currentLayout.length).fill(null);
        manualFixedIds.forEach(id => {
            const idx = currentLayout.findIndex(s => s.id === id);
            finalMap[idx] = currentLayout.find(s => s.id === id);
        });
        const shuffleArr = (arr) => arr.sort(() => Math.random() - 0.5);

        // 確保 149 坐在視覺最後面
        const targetStudent = pool.find(s => s.id === forceLastRowId);
        if (targetStudent) {
            const lastRowIndices = [0, 1, 2, 3, 4, 5, 6, 7];
            const availableLastRow = lastRowIndices.filter(idx => freeIndices.includes(idx));
            
            if (availableLastRow.length > 0) {
                const chosenIdx = availableLastRow[Math.floor(Math.random() * availableLastRow.length)];
                finalMap[chosenIdx] = targetStudent;
                freeIndices = freeIndices.filter(idx => idx !== chosenIdx);
                pool = pool.filter(s => s.id !== forceLastRowId);
            }
        }

        const fPool = pool.filter(s => groupFour.includes(s.id));
        if (fPool.length === 4) {
            let blocks = [];
            for (let r = 0; r < 6; r++) {
                for (let c = 0; c < 8; c += 2) {
                    let b = [r*8+c, r*8+c+1, (r+1)*8+c, (r+1)*8+c+1];
                    if (b.every(idx => freeIndices.includes(idx))) blocks.push(b);
                }
            }
            if (blocks.length > 0) {
                const b = blocks[Math.floor(Math.random() * blocks.length)];
                shuffleArr(fPool).forEach((s, i) => {
                    finalMap[b[i]] = s;
                    freeIndices = freeIndices.filter(idx => idx !== b[i]);
                    pool = pool.filter(p => p.id !== s.id);
                });
            }
        }
        [pairA, pairB].forEach(pIds => {
            const pPool = pool.filter(s => pIds.includes(s.id));
            if (pPool.length === 2) {
                let pairs = [];
                for (let i of freeIndices) { if (i % 2 === 0 && freeIndices.includes(i + 1)) pairs.push([i, i + 1]); }
                if (pairs.length > 0) {
                    const p = pairs[Math.floor(Math.random() * pairs.length)];
                    shuffleArr(pPool).forEach((s, i) => {
                        finalMap[p[i]] = s;
                        freeIndices = freeIndices.filter(idx => idx !== p[i]);
                        pool = pool.filter(item => item.id !== s.id);
                    });
                }
            }
        });
        shuffleArr(pool);
        freeIndices.forEach((idx, i) => { finalMap[idx] = pool[i]; });
        currentLayout = currentLayout.map((s, i) => {
            if (s.id === 'empty') return s;
            return { ...finalMap[i], pos: s.pos };
        });
        
        save(); renderGrid(); showToast("重新排列完成");
    }

    function saveToHistory() {
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
        const sub = document.getElementById('subject').options[document.getElementById('subject').selectedIndex].text;
        historyRecords.unshift({ 
            id: Date.now(), 
            name: `${timeStr} (${sub})`, 
            layout: [...currentLayout], 
            attendance: {...attendance}, 
            fixedIds: [...manualFixedIds],
            subjectIdx: document.getElementById('subject').selectedIndex 
        });
        if(historyRecords.length > 15) historyRecords.pop();
        localStorage.setItem('xe60c_history', JSON.stringify(historyRecords));
        renderHistory(); showToast("紀錄已儲存");
    }

    function renderHistory() {
        const container = document.getElementById('history-list');
        container.innerHTML = historyRecords.length === 0 ? '<p style="color:var(--apple-text-sec); margin-left: 5px;">目前尚無儲存的紀錄</p>' : '';
        historyRecords.forEach(rec => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div><span style="color:var(--apple-text); font-weight:600; font-size:15px;">${rec.name}</span></div>
                <div class="history-item-actions">
                    <button class="btn-history-load" onclick="loadHistory(${rec.id})">載入</button>
                    <button class="btn-history-del" onclick="deleteHistory(${rec.id})">刪除</button>
                </div>`;
            container.appendChild(item);
        });
    }

    function loadHistory(id) {
        const rec = historyRecords.find(r => r.id === id);
        if(rec) { 
            currentLayout = [...rec.layout]; 
            attendance = {...rec.attendance}; 
            manualFixedIds = rec.fixedIds ? [...rec.fixedIds] : [];
            document.getElementById('subject').selectedIndex = rec.subjectIdx; 
            save(); renderGrid(); updateUI(); showToast("已載入紀錄");
        }
    }

    function deleteHistory(id) {
        if(confirm("確定要刪除這筆歷史紀錄嗎？")) {
            historyRecords = historyRecords.filter(r => r.id !== id);
            localStorage.setItem('xe60c_history', JSON.stringify(historyRecords));
            renderHistory(); 
            showToast("紀錄已刪除");
        }
    }

    function save() {
        localStorage.setItem('xe60c_att', JSON.stringify(attendance));
        localStorage.setItem('xe60c_layout', JSON.stringify(currentLayout));
        localStorage.setItem('xe60c_fixed', JSON.stringify(manualFixedIds));
    }
    
    function updateUI() {
        const p = Object.values(attendance).filter(v => v !== false).length;
        document.getElementById('count-p').innerText = p;
        document.getElementById('count-a').innerText = 55 - p;
    }

    function resetData() {
        if(confirm("確定要清空所有鎖定並恢復初始位置嗎？")) {
            manualFixedIds = []; currentLayout = [...rawData]; save(); renderGrid(); showToast("已還原初始狀態");
        }
    }

    function exportResult() {
        const sub = document.getElementById('subject').options[document.getElementById('subject').selectedIndex].text;
        const list = currentLayout.filter(s => s.id !== 'empty' && attendance[s.id] === false).map(s => s.ch);
        navigator.clipboard.writeText(`【${sub}】缺席名單：` + (list.join(', ') || '無'));
        showToast("缺席名單已複製至剪貼簿");
    }
    
    // Apple 風格動態島提示
    let toastTimeout;
    function showToast(msg) { 
        const t = document.getElementById('toast'); 
        t.innerText = msg; 
        t.classList.add('show'); 
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => t.classList.remove('show'), 2000); 
    }

    init();
</script>
</body>
</html>
