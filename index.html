<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, user-scalable=yes">
    <title>XE60C 智慧點名系統 v2.3</title>
    <style>
        :root { 
            --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; 
            --bg: #f0f2f5; --highlight: #3498db; --card-bg: #ffffff; --purple: #8e44ad; --lock: #f39c12;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { width: 1000px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .tab-nav { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { padding: 12px 30px; cursor: pointer; border: none; background: none; font-size: 1.1rem; color: #7f8c8d; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { color: var(--highlight); border-bottom: 3px solid var(--highlight); margin-bottom: -2px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        .page { display: none; }
        .page.active { display: block; }
        .seating-chart { 
            display: grid; grid-template-columns: repeat(2, 100px) 35px repeat(2, 100px) 35px repeat(2, 100px) 35px repeat(2, 100px); 
            gap: 10px; padding: 20px; background: #dfe4ea; border-radius: 10px; justify-content: center;
        }
        .seat { 
            background: white; border: 2px solid #ccc; border-radius: 6px; padding: 10px 2px; text-align: center; min-height: 85px; 
            position: relative; cursor: pointer; display: flex; flex-direction: column; justify-content: center; transition: 0.2s;
        }
        .seat.present { background: #e6fffa; border-color: var(--success); }
        .seat.absent { background: #fff5f5; border-color: var(--danger); }
        .seat.locked { border: 2px solid var(--lock); box-shadow: 0 0 5px rgba(243, 156, 18, 0.4); }
        .seat.empty { background: #eee; border: 1px dashed #aaa; cursor: default; opacity: 0.5; pointer-events: none; }
        
        .seat-ctrls { position: absolute; top: 2px; right: 2px; display: flex; gap: 2px; z-index: 10; }
        .mini-btn { width: 18px; height: 18px; font-size: 0.6rem; background: #eee; border-radius: 3px; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; }
        .seat.locked .lock-btn { background: var(--lock); color: white; border-color: var(--lock); }

        .footer-controls { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        
        /* 彈窗選擇器 */
        #picker-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center; }
        .picker-content { background:white; padding:20px; border-radius:15px; width:600px; max-height:80vh; overflow-y:auto; }
        .picker-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin-top:15px; }
        .picker-item { padding:8px; border:1px solid #ddd; border-radius:5px; cursor:pointer; text-align:center; font-size:0.8rem; }
        .picker-item:hover { background: var(--highlight); color:white; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center;"><h1>XE60C 智慧點名系統 v2.3</h1></header>

    <div class="tab-nav">
        <div class="tab-btn active" onclick="switchPage('grid', event)">🪑 指定座位模式</div>
        <div class="tab-btn" onclick="switchPage('focus', event)">🔢 導航點名模式</div>
    </div>

    <div class="header-box">
        <div>科目: <select id="subject"><option>西班牙文</option><option>音樂</option><option>電腦</option></select></div>
        <div style="color:var(--success)">出席: <span id="count-p">0</span></div>
        <div style="color:var(--danger)">缺席: <span id="count-a">0</span></div>
        <button style="background:var(--primary); color:white;" onclick="exportResult()">複製結果</button>
    </div>

    <div id="page-grid" class="page active">
        <div id="seating-grid" class="seating-chart"></div>
        <div style="text-align:center; margin-top:10px; color:#666; font-size:0.9rem;">
            操作說明：點擊右上方 <b>👤</b> 更換該位同學 | 點擊 <b>🔓</b> 鎖定位置 | 點擊中間切換出席
        </div>
    </div>

    <div id="page-focus" class="page">
        <div style="text-align:center; padding:40px;">
            <div style="display:inline-block; border:3px solid var(--highlight); padding:30px; border-radius:20px; background:white;">
                <div style="color:#718096;">座號：<span id="f-id">--</span></div>
                <div id="f-name" style="font-size:3rem; font-weight:bold; margin:15px 0;">--</div>
                <div id="f-status" style="font-weight:bold; margin-bottom:20px;">--</div>
                <button style="background:var(--success); color:white;" onclick="step(true)">出席 (Enter)</button>
                <button style="background:var(--danger); color:white;" onclick="step(false)">缺席 (Space)</button>
            </div>
            <div style="margin-top:20px;">
                <button onclick="changeFocus(-1)">⬅ 上一位</button>
                <button onclick="changeFocus(1)">下一位 ➡</button>
            </div>
        </div>
    </div>

    <div class="footer-controls">
        <button style="background:var(--purple); color:white;" onclick="shuffleSeats()">🔀 打亂「未指定」的座位</button>
        <button style="background:#edf2f7; color:#4a5568;" onclick="resetAll()">全部重設</button>
    </div>
</div>

<div id="picker-overlay">
    <div class="picker-content">
        <h3>選擇要安排在此位置的學生</h3>
        <div class="picker-grid" id="student-picker-list"></div>
        <button style="margin-top:20px; width:100%; background:#eee;" onclick="closePicker()">取消</button>
    </div>
</div>

<script>
    const rawData = [
        {pos:"1-7", id:"1114300146", ch:"李婕禕"}, {pos:"2-7", id:"1114300501", ch:"賈伯珍"}, {pos:"3-7", id:"1114300174", ch:"蔡悅琳"}, {pos:"4-7", id:"1114300137", ch:"賴瑾安"}, {pos:"5-7", id:"1114300154", ch:"張鈺婕"}, {pos:"6-7", id:"1114300165", ch:"趙于嫻"}, {pos:"7-7", id:"1114300141", ch:"林紫騏"}, {pos:"8-7", id:"1114300173", ch:"黃毓霏"},
        {pos:"1-6", id:"1114300155", ch:"朱雯芳"}, {pos:"2-6", id:"1114300169", ch:"遊梁健雅"}, {pos:"3-6", id:"1114300124", ch:"林沁榆"}, {pos:"4-6", id:"1114300130", ch:"陳祉恩"}, {pos:"5-6", id:"1114300175", ch:"陳宥卉"}, {pos:"6-6", id:"1114300164", ch:"王以倫"}, {pos:"7-6", id:"1114300163", ch:"曲孝寬"}, {pos:"8-6", id:"1114300138", ch:"羅凱爾"},
        {pos:"1-5", id:"1114300171", ch:"張湘翊"}, {pos:"2-5", id:"1114300160", ch:"陳漢庭"}, {pos:"3-5", id:"1114300159", ch:"陳冠宇"}, {pos:"4-5", id:"1114300123", ch:"陳湘甯"}, {pos:"5-5", id:"1114300131", ch:"陳又瑄"}, {pos:"6-5", id:"1114300170", ch:"張子瑜"}, {pos:"7-5", id:"1114300121", ch:"龔昱瑄"}, {pos:"8-5", id:"1114300151", ch:"張雅玟"},
        {pos:"1-4", id:"1114300153", ch:"陳以婕"}, {pos:"2-4", id:"1114300167", ch:"柯品瑀"}, {pos:"3-4", id:"1114300158", ch:"陳琦涵"}, {pos:"4-4", id:"1114300147", ch:"李恩妮"}, {pos:"5-4", id:"1114300129", ch:"陳靜宜"}, {pos:"6-4", id:"1114300148", ch:"林金姵"}, {pos:"7-4", id:"1114300127", ch:"陳乙瑄"}, {pos:"8-4", id:"1114300143", ch:"許唯芯"},
        {pos:"1-3", id:"1114300161", ch:"張乙芹"}, {pos:"2-3", id:"1114300133", ch:"陳玟慈"}, {pos:"3-3", id:"1114300132", ch:"賴宥璇"}, {pos:"4-3", id:"1114300139", ch:"辛俊文"}, {pos:"5-3", id:"1114300140", ch:"黃靖晏"}, {pos:"6-3", id:"1114300157", ch:"楊芷芹"}, {pos:"7-3", id:"1114300142", ch:"吳霈瑜"}, {pos:"8-3", id:"1114300172", ch:"廖靚薇"},
        {pos:"1-2", id:"1114300128", ch:"王溱妤"}, {pos:"2-2", id:"1114300134", ch:"江芯語"}, {pos:"3-2", id:"1114300502", ch:"鄭皓軒"}, {pos:"4-2", id:"1114300156", ch:"連子甯"}, {pos:"5-2", id:"1114300126", ch:"林奕帆"}, {pos:"6-2", id:"1114300152", ch:"牛昱翔"}, {pos:"7-2", id:"1114300135", ch:"陳世豪"}, {pos:"8-2", id:"1114300166", ch:"林宜樺"},
        {pos:"1-1", id:"1114300162", ch:"王妍菻"}, {pos:"2-1", id:"1114300168", ch:"卓彥均"}, {pos:"3-1", id:"1114300144", ch:"遊芯語"}, {pos:"4-1", id:"1114300149", ch:"陳可紜"}, {pos:"5-1", id:"1114300136", ch:"曾安岑"}, {pos:"6-1", id:"1114300145", ch:"李易昌"}, {pos:"7-1", id:"1114300122", ch:"余沛容"}, {pos:"8-1", id:"empty", ch:"(空位)"}
    ];

    let attendance = JSON.parse(localStorage.getItem('xe60c_v2')) || {};
    let currentLayout = JSON.parse(localStorage.getItem('xe60c_layout')) || [...rawData];
    let lockedIds = JSON.parse(localStorage.getItem('xe60c_locks')) || [];
    let sortedList = rawData.filter(s => s.id !== 'empty').sort((a,b) => a.id.localeCompare(b.id));
    let focusIdx = 0;
    let pickingPosIndex = null;

    function init() { renderGrid(); updateUI(); }

    function renderGrid() {
        const grid = document.getElementById('seating-grid');
        grid.innerHTML = '';
        currentLayout.forEach((s, i) => {
            const seat = document.createElement('div');
            if (s.id === 'empty') {
                seat.className = 'seat empty';
                seat.innerHTML = `<span style="font-size:0.7rem">${s.pos}</span><br>空位`;
            } else {
                if(attendance[s.id] === undefined) attendance[s.id] = true;
                const isLocked = lockedIds.includes(s.id);
                seat.className = `seat ${attendance[s.id] ? 'present' : 'absent'} ${isLocked ? 'locked' : ''}`;
                seat.innerHTML = `
                    <div class="seat-ctrls">
                        <div class="mini-btn" onclick="openPicker(${i}, event)">👤</div>
                        <div class="mini-btn lock-btn" onclick="toggleLock('${s.id}', event)">${isLocked ? '🔒' : '🔓'}</div>
                    </div>
                    <span style="font-size:0.6rem">${s.pos}</span><br><b>${s.id.slice(-3)}</b><br>${s.ch}`;
                seat.onclick = () => { attendance[s.id] = !attendance[s.id]; save(); renderGrid(); updateUI(); };
            }
            grid.appendChild(seat);
            if ((i + 1) % 8 !== 0 && (i + 1) % 2 === 0) grid.appendChild(document.createElement('div')).className='gap-column';
        });
    }

    // 打開選人視窗
    function openPicker(index, e) {
        e.stopPropagation();
        pickingPosIndex = index;
        const listEl = document.getElementById('student-picker-list');
        listEl.innerHTML = '';
        
        // 列出所有學生，方便指定
        sortedList.forEach(student => {
            const item = document.createElement('div');
            item.className = 'picker-item';
            item.innerText = `${student.id.slice(-3)} ${student.ch}`;
            item.onclick = () => pickStudent(student);
            listEl.appendChild(item);
        });
        document.getElementById('picker-overlay').style.display = 'flex';
    }

    function pickStudent(newStudent) {
        const oldStudent = currentLayout[pickingPosIndex];
        
        // 1. 找到這位新同學原本在哪個位置，把它跟舊同學對調
        const oldPosOfNewStudent = currentLayout.findIndex(s => s.id === newStudent.id);
        if(oldPosOfNewStudent !== -1) {
            currentLayout[oldPosOfNewStudent] = { ...oldStudent, pos: currentLayout[oldPosOfNewStudent].pos };
        }
        
        // 2. 把新同學放到指定位置
        currentLayout[pickingPosIndex] = { ...newStudent, pos: oldStudent.pos };
        
        // 3. 指定後自動鎖定
        if(!lockedIds.includes(newStudent.id)) lockedIds.push(newStudent.id);
        
        save();
        closePicker();
        renderGrid();
    }

    function closePicker() { document.getElementById('picker-overlay').style.display = 'none'; }

    function toggleLock(id, e) {
        e.stopPropagation();
        lockedIds = lockedIds.includes(id) ? lockedIds.filter(x => x !== id) : [...lockedIds, id];
        localStorage.setItem('xe60c_locks', JSON.stringify(lockedIds));
        renderGrid();
    }

    function shuffleSeats() {
        // 1. 找出所有未鎖定的學生 ID
        let pool = currentLayout.filter(s => s.id !== 'empty' && !lockedIds.includes(s.id));
        
        // 2. 洗牌
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        
        // 3. 填回未鎖定的位置
        let poolIdx = 0;
        currentLayout = currentLayout.map(cell => {
            if (cell.id === 'empty' || lockedIds.includes(cell.id)) return cell;
            const nextStudent = pool[poolIdx++];
            return { ...nextStudent, pos: cell.pos };
        });
        
        save();
        renderGrid();
    }

    // 基本邏輯保持不變
    function switchPage(p, e) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        e.currentTarget.classList.add('active');
    }
    function updateUI() {
        const p = Object.values(attendance).filter(v => v).length;
        document.getElementById('count-p').innerText = p;
        document.getElementById('count-a').innerText = sortedList.length - p;
        const s = sortedList[focusIdx];
        document.getElementById('f-id').innerText = s.id.slice(-3);
        document.getElementById('f-name').innerText = s.ch;
        const st = document.getElementById('f-status');
        st.innerText = attendance[s.id] ? "出席中" : "缺席中";
        st.style.color = attendance[s.id] ? "var(--success)" : "var(--danger)";
    }
    function step(v) { attendance[sortedList[focusIdx].id] = v; save(); changeFocus(1); renderGrid(); }
    function changeFocus(n) { focusIdx = (focusIdx + n + sortedList.length) % sortedList.length; updateUI(); }
    function save() { 
        localStorage.setItem('xe60c_v2', JSON.stringify(attendance)); 
        localStorage.setItem('xe60c_layout', JSON.stringify(currentLayout));
        localStorage.setItem('xe60c_locks', JSON.stringify(lockedIds));
    }
    function resetAll() { if(confirm('確定重置所有資料？')) { localStorage.clear(); location.reload(); } }
    function exportResult() {
        const list = sortedList.filter(s => !attendance[s.id]).map(s => `${s.id.slice(-3)}${s.ch}`);
        const txt = `${document.getElementById('subject').value} 點名紀錄\n缺席：${list.length ? list.join(', ') : '全員出席'}`;
        navigator.clipboard.writeText(txt).then(() => alert('已複製！'));
    }
    document.addEventListener('keydown', (e) => {
        if(!document.getElementById('page-focus').classList.contains('active')) return;
        if(e.key === 'Enter') step(true);
        if(e.key === ' ') { e.preventDefault(); step(false); }
    });

    init();
</script>
</body>
</html>
